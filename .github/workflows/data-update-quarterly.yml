name: Data Update (quarterly / reinfolib)

# reinfolib 由来データ（災害リスク + 駅・保育・医療）を四半期ごとに更新。
# 各県を並列 fetch → アーティファクト化 → 集約ジョブ(open-pr)が全県分をまとめて
# 単一 PR を自動作成する（旧: 各県が main へ直 push → 並列レースで失敗するため変更）。
# preview への反映が必要な時は Deploy Preview ワークフローを手動実行する。
on:
  schedule:
    # 1/1・4/1・7/1・10/1 の 04:00 JST（= 各前日 19:00 UTC）。
    # 月末日が異なるため2本に分割（6月/9月は31日が無く単一 cron では発火しないため）。
    - cron: "0 19 31 12,3 *"   # 12/31・3/31 UTC → 1/1・4/1 JST
    - cron: "0 19 30 6,9 *"    # 6/30・9/30 UTC → 7/1・10/1 JST
  workflow_dispatch:
    inputs:
      pref:
        description: "対象都道府県の slug。カンマ区切りで複数可 (例: fukushima,tokyo)。省略時は全 pref"
        required: false
        default: ""

permissions:
  contents: write        # data ブランチの push
  pull-requests: write   # 更新 PR の作成
  issues: write          # 失敗通知 issue の作成

concurrency:
  group: data-update-quarterly
  cancel-in-progress: false

jobs:
  resolve-prefs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      prefs: ${{ steps.set.outputs.prefs }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          input="${{ inputs.pref }}"
          if [[ -n "$input" ]]; then
            # カンマ区切りで複数 slug を受け付け、既知の slug か検証して JSON 配列にする
            # （失敗県のリカバリ時に複数県をまとめて再実行できるように）。
            # shellcheck disable=SC2016 # ${} は JS のテンプレートリテラル。シェル展開させない
            list=$(node -e '
              const input = process.argv[1];
              import("./scripts/_lib/prefs.mjs").then((m) => {
                const slugs = [...new Set(input.split(",").map((s) => s.trim()).filter(Boolean))];
                const unknown = slugs.filter((s) => !m.PREFS[s]);
                if (unknown.length) { console.error(`未知の pref slug: ${unknown.join(", ")}`); process.exit(1); }
                console.log(JSON.stringify(slugs));
              });
            ' "$input")
            echo "prefs=$list" >> "$GITHUB_OUTPUT"
          else
            # scripts/_lib/prefs.mjs から slug を抽出（key 名）
            list=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(JSON.stringify(Object.keys(m.PREFS))))')
            echo "prefs=$list" >> "$GITHUB_OUTPUT"
          fi

  fetch:
    needs: resolve-prefs
    runs-on: ubuntu-latest
    # reinfolib のネットワーク障害でジョブが GitHub 既定の 6h まで hang しないように
    # 上限を切る。step 側の上限が先に効き、タイルキャッシュ保存(always)の時間を残す。
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 3       # reinfolib API 過負荷防止
      matrix:
        pref: ${{ fromJson(needs.resolve-prefs.outputs.prefs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # restore/save を分離し、fetch が失敗しても取得済みタイルを保存する
      # （actions/cache 一体型はジョブ失敗時に保存せず、再実行のたびに全量取得になり
      # reinfolib の一時エラーを引きやすかった）。key は run ごとに一意にして常に保存し、
      # restore-keys の前方一致で最新キャッシュを復元する。
      - name: Restore reinfolib tile cache (${{ matrix.pref }})
        uses: actions/cache/restore@v4
        with:
          path: .cache/reinfolib-tiles/${{ matrix.pref }}
          key: reinfolib-tiles-${{ matrix.pref }}-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            reinfolib-tiles-${{ matrix.pref }}-v1

      - name: Fetch hazard (XKT026/029)
        timeout-minutes: 60
        run: node --max-old-space-size=4096 scripts/fetch-hazard.mjs --pref=${{ matrix.pref }}
        env:
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}

      - name: Fetch amenities (XKT015/007/010)
        timeout-minutes: 60
        run: node --max-old-space-size=4096 scripts/fetch-amenities.mjs --pref=${{ matrix.pref }}
        env:
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}

      # main へは push せず、変更後データをアーティファクトに退避（集約ジョブが回収）。
      - name: Upload fetched data
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ matrix.pref }}
          path: |
            data/${{ matrix.pref }}.json
            data/${{ matrix.pref }}_wards.json
          if-no-files-found: ignore
          retention-days: 1

      # fetch が失敗しても、そこまでに取得済みのタイルは保存して再実行を軽くする。
      - name: Save reinfolib tile cache (${{ matrix.pref }})
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/reinfolib-tiles/${{ matrix.pref }}
          key: reinfolib-tiles-${{ matrix.pref }}-v1-${{ github.run_id }}-${{ github.run_attempt }}

  # 全 fetch ジョブのアーティファクトを回収し、全県分の差分を1コミットにまとめて単一 PR を作成。
  open-pr:
    needs: [resolve-prefs, fetch]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all pref data artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/incoming
          pattern: data-*
          merge-multiple: true

      - name: Apply fetched data into data/
        run: |
          mkdir -p data
          find /tmp/incoming -name '*.json' -exec cp {} data/ \; 2>/dev/null || true
          echo "変更ファイル:"; git status --porcelain data/ || true

      # 破損 JSON（フィールド欠落・型崩れ・コード重複）を PR 前に堰き止める。
      # 依存パッケージ不要のため npm ci はしない。
      - name: Validate data JSONs
        run: node scripts/validate-data.mjs

      # fetch に失敗した県（=アーティファクト無し）を検出し、PR 本文で明示する。
      # 従来は失敗県が古いデータのまま黙って PR に載っていた。
      - name: Detect failed prefs
        id: failed
        run: |
          missing=""
          for p in $(echo '${{ needs.resolve-prefs.outputs.prefs }}' | jq -r '.[]'); do
            [[ -f "/tmp/incoming/${p}.json" ]] || missing="$missing $p"
          done
          missing="${missing# }"
          echo "missing=$missing" >> "$GITHUB_OUTPUT"
          if [[ -n "$missing" ]]; then
            echo "::warning::fetch 失敗県（今回の PR では未更新）: $missing"
          fi

      - name: Create PR if data changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISSING: ${{ steps.failed.outputs.missing }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "全県で差分なし。PR は作成しない。"
            exit 0
          fi
          # run_attempt を含め、失敗ジョブの再実行（同一 run_id）でもブランチが衝突しないようにする。
          BRANCH="data/quarterly-${{ github.run_id }}-${{ github.run_attempt }}"
          git switch -c "$BRANCH"
          git add data/
          git commit -m "chore(data): quarterly reinfolib update (run ${{ github.run_id }})"
          git push origin "$BRANCH"
          BODY="quarterly ワークフロー (run ${{ github.run_id }}) による更新。各県の fetch 結果を集約した単一 PR です。マージ後、必要なら Deploy Preview を手動実行してください。"
          if [[ -n "$MISSING" ]]; then
            # shellcheck disable=SC2016 # バッククォートを Markdown として literal に埋めるため単引用符
            printf -v BODY '%s\n\n> [!WARNING]\n> fetch に失敗し**この PR に含まれていない**県: `%s`\n> workflow_dispatch の `pref` 入力（カンマ区切りで複数可）で再実行するか、失敗ジョブを Re-run してください。' "$BODY" "$MISSING"
          fi
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): 四半期データ更新 (reinfolib 災害/生活インフラ)" \
            --body "$BODY"

  # スケジュール実行の失敗は誰も画面を見ていないため、issue を立てて通知する
  # （issue 作成は Watch していれば通知が届く）。PR 本文の失敗県警告は
  # 「PR が作られた場合」しか目に入らないので、その補完。
  notify-failure:
    needs: [resolve-prefs, fetch, open-pr]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create --repo "${{ github.repository }}" \
            --title "🚨 quarterly データ更新が失敗 (run ${{ github.run_id }})" \
            --body "[実行ログ]($url) を確認してください。失敗県は workflow_dispatch の \`pref\` 入力（カンマ区切り）で再実行できます（docs/data-update.md 参照）。"
