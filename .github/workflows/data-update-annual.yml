name: Data Update (annual / e-Stat + NLNI + CFA)

# 年次更新（CFA Excel 公開後を想定して 3 月）。
# 全国まとめ取得方式: 人口/家賃(e-Stat)と待機児童(CFA)は全国を1回でまとめ取得、
# 地価(L01)は県別 zip のため逐次取得。1ジョブで data/*.json を生成し単一 PR を自動作成。
# （旧: 県別47ジョブが各自 e-Stat へ接続 → 毎回2-3県が接続タイムアウト＋CFAを47回DL。
#  本方式で接続バースト・冗長 DL・push レースをまとめて解消）。
# preview への反映が必要な時は Deploy Preview ワークフローを手動実行する。
on:
  schedule:
    # 3/15 深夜（UTC 19:00 = JST 04:00）
    - cron: "0 19 14 3 *"
  workflow_dispatch:
    inputs:
      pref:
        description: "対象都道府県 slug (省略で全 pref)"
        required: false
        default: ""

permissions:
  contents: write        # data ブランチの push
  pull-requests: write   # 更新 PR の作成
  issues: write          # 失敗通知 issue の作成

concurrency:
  group: data-update-annual
  cancel-in-progress: false

# 年度依存の出典バージョン（CFA_XLSX_URL / L01_VERSION / L01_ASOF / GSI_SHELTER_URL /
# GSI_SHELTER_ASOF / CFA_ASOF / FOREIGN_ASOF）は scripts/_lib/versions.mjs に集約した。
# 下の「バージョン設定を読み込み」ステップが $GITHUB_ENV に展開するので、
# 以降の bash ステップ（curl URL 等）は従来どおり $VAR / ${{ env.VAR }} で参照できる。
# 年度更新は versions.mjs だけを直す（scripts と workflow の二重管理を解消）。

jobs:
  update:
    runs-on: ubuntu-latest
    # e-Stat / nlftp のネットワーク障害で GitHub 既定の 6h まで hang しないよう上限を切る。
    # 実績は全県で 1h 前後だが、地価の県別逐次 DL が遅い時のマージンを持たせる。
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # scripts/_lib/versions.mjs を単一ソースとして各キーを環境変数へ展開する。
      # 以降のステップとスクリプトが同じ値を参照し、同期ずれを構造的に防ぐ。
      - name: バージョン設定を読み込み
        run: |
          node -e 'import("./scripts/_lib/versions.mjs").then(m=>{for(const[k,v]of Object.entries(m.VERSIONS))console.log(`${k}=${v}`)})' >> "$GITHUB_ENV"
          echo "読み込んだ年度設定:"; grep -E '^(CFA_|L01_|GSI_|FOREIGN_|MEDICAL_|S12_)' "$GITHUB_ENV" || true

      - name: スコープ決定（pref 入力 or 全県）
        id: scope
        run: |
          if [[ -n "${{ inputs.pref }}" ]]; then
            echo "estat=--pref=${{ inputs.pref }}" >> "$GITHUB_OUTPUT"
            echo "prefs=${{ inputs.pref }}" >> "$GITHUB_OUTPUT"
          else
            echo "estat=--all" >> "$GITHUB_OUTPUT"
            echo "prefs=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(Object.keys(m.PREFS).join(" ")))')" >> "$GITHUB_OUTPUT"
          fi

      - name: 待機児童 Excel を取得（全国1回）
        run: curl -sL -o /tmp/cfa_waitlist.xlsx "${{ env.CFA_XLSX_URL }}"

      - name: 人口（e-Stat 全国一括）
        run: node scripts/fetch-population-2025.mjs ${{ steps.scope.outputs.estat }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: 家賃（e-Stat 全国一括）
        run: node scripts/fetch-rent.mjs ${{ steps.scope.outputs.estat }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: 医療機関（医療施設調査, e-Stat 全国一括）
        run: node scripts/fetch-medical.mjs ${{ steps.scope.outputs.estat }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: 駅数（国土数値情報 S12 全国 GeoJSON・全国一括）
        timeout-minutes: 30
        run: |
          if [[ -z "${S12_URL}" ]]; then
            echo "::warning::S12_URL 未設定のため駅数更新をスキップ（docs/data-update.md 参照）"
            exit 0
          fi
          ok=""
          for i in 1 2 3; do
            if curl -fsSL -o /tmp/s12.zip "${S12_URL}"; then ok=1; break; fi
            echo "S12 DL retry $i"; sleep 3
          done
          if [[ -z "$ok" ]]; then echo "::warning::S12 download failed"; exit 0; fi
          rm -rf /tmp/s12 && unzip -oq /tmp/s12.zip -d /tmp/s12
          # UTF-8 版の GeoJSON を優先（Shift-JIS 版も同梱されるため）。
          GJ=$(find /tmp/s12 -path '*UTF-8*' -name '*.geojson' | head -1)
          [[ -z "$GJ" ]] && GJ=$(find /tmp/s12 -name '*.geojson' | head -1)
          if [[ -z "$GJ" || ! -s "$GJ" ]]; then echo "::warning::S12 geojson not found"; exit 0; fi
          S12_GEOJSON="$GJ" node --max-old-space-size=4096 scripts/fetch-stations.mjs ${{ steps.scope.outputs.estat }} \
            || echo "::warning::fetch-stations failed"

      - name: 待機児童（CFA 全国一括）
        run: WAITLIST_XLSX=/tmp/cfa_waitlist.xlsx node scripts/fetch-waitlist.mjs ${{ steps.scope.outputs.estat }}

      - name: 地価（L01 県別 zip・逐次, DL リトライ＋県別失敗は警告で継続）
        timeout-minutes: 180
        run: |
          for pref in ${{ steps.scope.outputs.prefs }}; do
            code=$(node -e "import('./scripts/_lib/prefs.mjs').then(m=>console.log(m.getPref('$pref').code))")
            url="https://nlftp.mlit.go.jp/ksj/gml/data/L01/L01-${L01_VERSION}/L01-${L01_VERSION}_${code}_GML.zip"
            ok=""
            for i in 1 2 3; do
              if curl -fsSL -o /tmp/l01.zip "$url"; then ok=1; break; fi
              echo "L01 DL retry $i: $pref"; sleep 3
            done
            if [[ -z "$ok" ]]; then echo "::warning::L01 download failed for $pref"; continue; fi
            rm -rf /tmp/l01 && unzip -oq /tmp/l01.zip -d /tmp/l01
            GEOJSON="/tmp/l01/L01-${L01_VERSION}_${code}_GML/L01-${L01_VERSION}_${code}.geojson"
            L01_GEOJSON="$GEOJSON" node scripts/fetch-land-price.mjs --pref="$pref" || echo "::warning::land price failed for $pref"
          done

      - name: 指定緊急避難場所（国土地理院 全国版CSV・全国一括）
        timeout-minutes: 60
        run: |
          if [[ -z "${GSI_SHELTER_URL}" ]]; then
            echo "::warning::GSI_SHELTER_URL 未設定のため避難場所更新をスキップ（docs/data-update.md §9）"
            exit 0
          fi
          ok=""
          for i in 1 2 3; do
            if curl -fsSL -o /tmp/shelter_dl "${GSI_SHELTER_URL}"; then ok=1; break; fi
            echo "GSI shelter DL retry $i"; sleep 3
          done
          if [[ -z "$ok" ]]; then echo "::warning::GSI shelter download failed"; exit 0; fi
          # 直CSV / zip どちらでも対応（GSI は直CSVだが zip 配布になっても拾えるように）。
          if unzip -tq /tmp/shelter_dl >/dev/null 2>&1; then
            rm -rf /tmp/hinanbasho && unzip -oq /tmp/shelter_dl -d /tmp/hinanbasho
            # 指定緊急避難場所 = mergeFromCity_2.csv を優先。無ければ任意の CSV。
            CSV=$(find /tmp/hinanbasho -iname 'mergeFromCity_2.csv' | head -1)
            [[ -z "$CSV" ]] && CSV=$(find /tmp/hinanbasho -iname '*.csv' | head -1)
          else
            CSV=/tmp/shelter_dl
          fi
          if [[ -z "$CSV" || ! -s "$CSV" ]]; then echo "::warning::shelter CSV not found"; exit 0; fi
          GSI_SHELTER_CSV="$CSV" node --max-old-space-size=4096 scripts/fetch-shelters.mjs ${{ steps.scope.outputs.estat }} \
            || echo "::warning::fetch-shelters failed"

      # 破損 JSON（フィールド欠落・型崩れ・コード重複）を PR 前に堰き止める。
      - name: Validate data JSONs
        run: node scripts/validate-data.mjs

      - name: 差分があれば単一 PR を作成
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "差分なし。PR は作成しない。"
            exit 0
          fi
          BRANCH="data/annual-${{ github.run_id }}"
          git switch -c "$BRANCH"
          git add data/
          git commit -m "chore(data): annual estat/nlni/cfa update (run ${{ github.run_id }})"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): 年次データ更新 (e-Stat / NLNI L01 / CFA)" \
            --body "annual ワークフロー (run ${{ github.run_id }}) による年次データ更新。人口/家賃/待機児童を全国一括取得、地価を県別取得して集約した単一 PR です。マージ後、必要なら Deploy Preview を手動実行してください。"

      # 年1回のスケジュール実行なので、失敗に気づかないと翌年まで古いデータのままになる。
      # issue を立てて通知する（Watch していれば通知が届く）。
      - name: 失敗時に通知 issue を作成
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create --repo "${{ github.repository }}" \
            --title "🚨 annual データ更新が失敗 (run ${{ github.run_id }})" \
            --body "[実行ログ]($url) を確認してください。年度 env（CFA_XLSX_URL / L01_VERSION / L01_ASOF / GSI_SHELTER_URL）の期限切れの可能性があります（docs/data-update.md 参照）。"
