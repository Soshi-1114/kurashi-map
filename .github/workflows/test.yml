name: Test

# push / PR ごとの品質ゲート（型チェック・テスト・lint・データ検証）。
# データ更新 PR（data/ のみの変更）でも validate-data が破損 JSON の混入を防ぐ。
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Validate data JSONs
        run: node scripts/validate-data.mjs

      # 依存の既知脆弱性を可視化する。現状 next 14.2 系に major 昇格でしか直せない
      # 勧告が残るため、ゲートはブロッキングにせず情報提供に留める（恒久 red 回避）。
      # 恒久対応は Dependabot のセキュリティ更新 PR で行う。
      - name: Security audit (informational)
        run: npm audit --audit-level=high || true

